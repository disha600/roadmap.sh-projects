<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Unit Convertor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css' )}}">

</head>
<body>
    <header id="head1">
        <h1>Unit Convertor</h1>
        
    </header>
    <div class="nav-bar">
        <a href="{{ url_for('length' ) }}">Length</a>
        <a href="{{ url_for('weight' ) }}">Weight</a>
        <a href="{{ url_for('temp' ) }}">Temperature</a>
    </div>
    <form action="/result" , method="POST">
        <br>
        <label>Enter the length to convert</label>
        <br><br>
        <input name="value" type="text" required placeholder="Enter length">
        <br><br>
        <label>Unit to convert from</label>
        <select name="convert_from">
            <option>mm</option>
            <option>cm</option>
            <option>m</option>
            <option>km</option>
            <option>inch</option>
            <option>foot</option>
            <option>yard</option>
            <option>mile</option>
        </select>
        <br><br>
        <label>Unit to convert to</label>
        <select name="convert_to">
            <option>mm</option>
            <option>cm</option>
            <option>m</option>
            <option>km</option>
            <option>inch</option>
            <option>foot</option>
            <option>yard</option>
            <option>mile</option>
        </select>
        <br><br>

        <button>Convert</button>

    </form>
</body>
</html>
